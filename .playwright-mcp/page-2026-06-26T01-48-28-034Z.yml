            - paragraph [ref=e262]:
              - text: Set
              - code [ref=e263]: "`OPENCODE_SERVER_PASSWORD`"
              - text: to protect the server with HTTP basic auth. The username defaults to
              - code [ref=e264]: "`opencode`"
              - text: ", or set"
              - code [ref=e265]: "`OPENCODE_SERVER_USERNAME`"
              - text: to override it. This applies to both
              - code [ref=e266]: "`opencode serve`"
              - text: and
              - code [ref=e267]: "`opencode web`"
              - text: .
