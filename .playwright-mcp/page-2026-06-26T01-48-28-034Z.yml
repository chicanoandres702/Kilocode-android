            - heading "How it works" [level=3] [ref=e281]:
              - link "How it works" [ref=e282]:
                - /url: "#how-it-works"
            - paragraph [ref=e283]:
              - text: When you run
              - code [ref=e284]: "`opencode`"
              - text: it starts a TUI and a server. Where the TUI is the client that talks to the server. The server exposes an OpenAPI 3.1 spec endpoint. This endpoint is also used to generate an
              - link "SDK" [ref=e285] [cursor=pointer]:
                - /url: /docs/sdk
              - text: .
            - complementary "Tip" [ref=e286]:
              - paragraph [ref=e287]:
                - img [ref=e288]
                - text: Tip
              - paragraph [ref=e292]: Use the opencode server to interact with opencode programmatically.
            - paragraph [ref=e293]: This architecture lets opencode support multiple clients and allows you to interact with opencode programmatically.
            - paragraph [ref=e294]:
              - text: You can run
              - code [ref=e295]: "`opencode serve`"
              - text: to start a standalone server. If you have the opencode TUI running,
              - code [ref=e296]: "`opencode serve`"
              - text: will start a new server.
            - separator [ref=e297]
            - heading "Connect to an existing server" [level=4] [ref=e298]:
              - link "Connect to an existing server" [ref=e299]:
                - /url: "#connect-to-an-existing-server"
            - paragraph [ref=e300]:
              - text: When you start the TUI it randomly assigns a port and hostname. You can instead pass in the
              - code [ref=e301]: "`--hostname`"
              - text: and
              - code [ref=e302]: "`--port`"
              - link "flags" [ref=e303] [cursor=pointer]:
                - /url: /docs/cli
              - text: . Then use this to connect to its server.
            - paragraph [ref=e304]:
              - text: The
              - 'link "`/tui`" [ref=e305] [cursor=pointer]':
                - /url: "#tui"
                - code [ref=e306]: "`/tui`"
              - text: endpoint can be used to drive the TUI through the server. For example, you can prefill or run a prompt. This setup is used by the OpenCode
              - link "IDE" [ref=e307] [cursor=pointer]:
                - /url: /docs/ide
              - text: plugins.
            - separator [ref=e308]
