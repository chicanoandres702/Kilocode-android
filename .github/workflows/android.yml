name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: kilocode-android/gradle.lockfile

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./kilocode-android/gradlew

      - name: Run Android tests
        run: ./kilocode-android/gradlew test

      - name: Run Android lint
        run: ./kilocode-android/gradlew lintDebug

      - name: Build debug APK
        run: ./kilocode-android/gradlew assembleDebug
