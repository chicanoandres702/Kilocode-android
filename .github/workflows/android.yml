name: Android CI

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kilocode-android

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          node-version: 22

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          node-version: 22

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run Android tests
        run: ./gradlew test

      - name: Run Android lint
        run: ./gradlew lintDebug

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kilocode-android-debug-apk
          path: kilocode-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  build-kilo-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: kilocode

      - name: Build Kilo CLI binary
        run: |
          cd kilocode/packages/opencode
          # Use the musl target for static linking to improve compatibility
          # We need to make sure the build is triggered correctly
          bun run script/build.ts
          # The script might output to a specific location, usually bin/kilo
          ls -R bin/

      - name: Upload Kilo CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: kilo-android-arm64
          path: kilocode/packages/opencode/bin/kilo

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: kilocode-android
    env:
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          node-version: 22

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          node-version: 22

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Write release keystore (if secrets available)
        id: keystore
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            mkdir -p ../keystore
            printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > ../keystore/release.keystore
            chmod 600 ../keystore/release.keystore
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Build debug APK (fallback)
        if: steps.keystore.outputs.has_keystore != 'true'
        run: ./gradlew assembleDebug

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: kilocode-android-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: ignore

      - name: Upload debug APK (fallback)
        if: steps.keystore.outputs.has_keystore != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kilocode-android-release-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          fi
          gh release create "$GITHUB_REF_NAME" "$APK_PATH" \
            --title "KiloCode Android $GITHUB_REF_NAME" \
            --notes "Android release $GITHUB_REF_NAME" \
            --verify-tag
