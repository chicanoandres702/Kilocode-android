name: Automated Security Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Kilo CLI
        run: npm install -g @kilocode/cli

      - name: Run Kilo Security Reviewer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run the security reviewer agent
          kilo run security-reviewer --input "Review the PR changes for security risks."
